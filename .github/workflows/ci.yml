name: CI
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  FORCE_COLOR: 1
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
jobs:
  package:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: 3.x
        cache: pip
    - name: Check packages
      run: |
        python -m pip install -U pip setuptools wheel build twine rstcheck
        python -m build
        rstcheck --ignore-messages "(Duplicate implicit target name:.*)" CHANGES.rst
        python -m twine check dist/*
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        - 3.14t
        - '3.15'
        os:
        - ubuntu-latest
        nox-session:
        - ''
        container:
        - ''
        include:
        - experimental: false
        - python-version: '3.12'
          os: ubuntu-24.04
          experimental: false
          nox-session: test_integration
        - python-version: 3.12.2
          os: ubuntu-24.04
          experimental: false
          nox-session: test-3.12
        - python-version: pypy-3.11
          os: ubuntu-24.04
          experimental: false
          nox-session: test-pypy3.11
        - python-version: '3.13'
          os: ubuntu-24.04
          container: python:3.13-bullseye
          experimental: false
          nox-session: test_min_pyopenssl
        - python-version: 3.x
          os: ubuntu-24.04
          experimental: false
          nox-session: test_brotlipy
        - python-version: '3.12'
          os: ubuntu-24.04
          nox-session: emscripten(node)
          experimental: true
        - python-version: '3.12'
          os: ubuntu-24.04
          nox-session: emscripten(firefox)
          experimental: true
        - python-version: '3.12'
          os: ubuntu-24.04
          nox-session: emscripten(chrome)
          experimental: true
        - python-version: '3.15'
          experimental: true
    runs-on: self-hosted
    container: ${{ matrix.container }}
    name: ${{ fromJson('{"macos-15":"macOS","windows-latest":"Windows","ubuntu-24.04":"Ubuntu"}')[matrix.os]
      }} ${{ matrix.python-version }} ${{ matrix.nox-session}}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      if: ${{ matrix.container == '' }}
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        check-latest: true
    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
      with:
        version: 0.11.7
    - name: Install Chrome
      uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded
      id: setup-chrome
      if: ${{ matrix.nox-session == 'emscripten(chrome)' }}
      with:
        install-chromedriver: true
        chrome-version: canary
    - name: Force override system chrome
      env:
        CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      run: |
        sudo rm -f /usr/bin/google-chrome
        sudo rm -f /usr/bin/chrome
        sudo ln -s $CHROME_PATH /usr/bin/google-chrome
        sudo ln -s $CHROME_PATH /usr/bin/chrome
        google-chrome --version
      if: ${{ matrix.nox-session == 'emscripten(chrome)' }}
    - name: Install Firefox
      uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8
      if: ${{ matrix.nox-session == 'emscripten(firefox)' }}
    - name: Install node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
      if: ${{ matrix.nox-session == 'emscripten(node)' }}
      with:
        node-version: 22
    - name: Cache pyodide downloads in nox cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      if: ${{ startsWith(matrix.nox-session, 'emscripten') }}
      with:
        path: .nox/.cache
        key: pyodide-downloads-${{ hashFiles('noxfile.py') }}
    - name: Run tests
      run: |
        uvx nox -s "$NOX_SESSION"
      env:
        NOX_SESSION: ${{ matrix.nox-session != '' && matrix.nox-session || format('test-{0}',
          matrix.python-version) }}
    - name: Upload coverage data
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: coverage-data-${{ matrix.python-version }}-${{ matrix.os }}-${{ matrix.experimental
          }}-${{ matrix.nox-session }}
        path: .coverage.*
        if-no-files-found: error
        include-hidden-files: true
  coverage:
    if: ${{ !cancelled() && (always()) }}
    runs-on: self-hosted
    needs: test
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: 3.x
    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
      with:
        version: 0.11.7
    - name: Install coverage
      run: uv sync --dev --frozen
    - name: Download coverage data
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: coverage-data-*
        merge-multiple: true
    - name: Combine & check coverage
      run: |
        uv run -m build
        uv run -m coverage combine
        uv run -m coverage html --skip-covered --skip-empty
        uv run -m coverage report --ignore-errors --show-missing --fail-under=100
    - if: ${{ failure() }}
      name: Upload report if check failed
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: coverage-report
        path: htmlcov
    timeout-minutes: 15
'on':
- push
- pull_request
- workflow_dispatch
